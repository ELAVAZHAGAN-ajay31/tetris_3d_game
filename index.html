<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Block Puzzle</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
<div id="ui">Use Arrow Keys to Move, Space to Drop</div>

<!-- FIX: Use module import instead of global THREE -->
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

let scene, camera, renderer;
let cube, speed = 0.02;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 10;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.BoxGeometry(1,1,1);
  const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  cube = new THREE.Mesh(geometry, material);
  scene.add(cube);

  // Add light (important for visibility in future upgrades)
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 7);
  scene.add(light);

  window.addEventListener('keydown', controls);
}

function controls(event) {
  if (!cube) return; // safety check

  switch(event.key) {
    case 'ArrowLeft': cube.position.x -= 1; break;
    case 'ArrowRight': cube.position.x += 1; break;
    case 'ArrowUp': cube.position.z -= 1; break;
    case 'ArrowDown': cube.position.z += 1; break;
    case ' ': cube.position.y = -5; break;
  }
}

function animate() {
  requestAnimationFrame(animate);

  if (cube) {
    cube.position.y -= speed;

    if(cube.position.y < -5) {
      cube.position.y = 5;
      cube.position.x = 0;
      cube.position.z = 0;
    }
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// BASIC TESTS (console checks)
console.assert(typeof THREE !== 'undefined', 'THREE failed to load');
console.assert(typeof init === 'function', 'Init function missing');
console.assert(typeof animate === 'function', 'Animate function missing');
</script>

</body>
</html>
